<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Page</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f4f4f4;
        }

        .container{
            text-align:center;
        }

        input{
            width:300px;
            padding:12px;
            font-size:16px;
            border:1px solid #ccc;
            border-radius:6px;
        }

        button{
            padding:12px 20px;
            margin-left:8px;
            background:#4285f4;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Search</h2>

    <form action="https://formsubmit.co/gopika.25bscaiml@kprcas ac.in" method="POST">
        <input
            type="text"
            name="search_query"
            placeholder="Search here..."
            required
        >

        <!-- Optional settings -->
        <input type="hidden" name="_subject" value="New Search Query">
        <input type="hidden" name="_captcha" value="false">

        <button type="submit">Search</button>
    </form>
</div>

</body>
</html>
