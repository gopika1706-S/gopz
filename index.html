<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPRCAS Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#f5f7fa,#c3cfe2);
}

.login-container{
    background:#fff;
    width:380px;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    text-align:center;
}

.logo{
    width:150px;
    margin-bottom:15px;
}

h2{
    color:#1e4e9e;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#1e4e9e;
}

.login-btn{
    width:100%;
    padding:12px;
    background:#1e4e9e;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#153b78;
}

.links{
    margin-top:15px;
}

.links a{
    text-decoration:none;
    color:#1e4e9e;
    font-size:14px;
}

.footer{
    margin-top:20px;
    color:#777;
    font-size:13px;
}
</style>
</head>

<body>

<div class="login-container">

    <!-- Replace logo.png with your logo file name -->
    <img src="logo.png" alt="KPRCAS Logo" class="logo">

    <h2>KPRCAS Student Login</h2>

    <form>
        <div class="input-group">
            <input type="text" placeholder="Username" required>
        </div>

        <div class="input-group">
            <input type="password" placeholder="Password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="links">
        <a href="#">Forgot Password?</a>
    </div>

    <div class="footer">
        LEARN BEYOND
    </div>

</div>

</body>
</html>
